events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Unlimited upload size at HTTP level
    client_max_body_size 0;

    server {
        # Railway provides the port via $PORT env var.
        listen 8080;

        server_name localhost;
        
        # INCREASE UPLOAD LIMIT (Redundant but safe)
        client_max_body_size 0;

        # === 1. API Endpoints (FastAPI) ===
        # These are used by the iPhone App
        location /songs {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Ensure API allows large uploads too
            client_max_body_size 0;
        }

        location /files {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 0;
        }

        location /docs {
            proxy_pass http://127.0.0.1:8000;
        }

        location /openapi.json {
            proxy_pass http://127.0.0.1:8000;
        }

        # === 2. Admin Dashboard (Streamlit) ===
        # Everything else goes to Streamlit
        location / {
            proxy_pass http://127.0.0.1:8501/;
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            
            # WebSocket support for Streamlit
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            # Unlimited upload for Admin
            client_max_body_size 0;
        }
        
        # Streamlit healthcheck/vendor routes
        location /_stcore {
             proxy_pass http://127.0.0.1:8501/_stcore;
             proxy_http_version 1.1;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header Host $host;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection "upgrade";
             proxy_read_timeout 86400;
        }
        
        location /vendor {
             proxy_pass http://127.0.0.1:8501/vendor;
        }
    }
}
